<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточки товаров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cards-container">
        <!-- Карточка товара 1 -->
        <div class="product-card">
            <img class="product-image" 
                 src="elegant-smartphone-composition_23-2149437106.jpg.avif" 
                 alt="Изображение товара 1">
            <h3 class="product-title">Смартфон</h3>
            <p class="product-description">
                Мощный процессор, 128 ГБ памяти, отличная камера и яркий дисплей.
            </p>
        </div>
        <div class="product-card">
            <img class="product-image" 
                 src="laptop-device-with-minimalist-monochrome-background_23-2150763336.jpg.avif" 
                 alt="Изображение товара 2">
            <h3 class="product-title">Ноутбук</h3>
            <p class="product-description">
                Лёгкий и производительный. Идеален для работы и учёбы.
            </p>
        </div>
        <div class="product-card">
            <img class="product-image" 
                 src="7328.jpg" 
                 alt="Изображение товара 3">
            <h3 class="product-title">Наушники</h3>
            <p class="product-description">
                Беспроводные, шумоподавление, до 30 часов работы.
            </p>
        </div>
    </div>
</body>
</html>
