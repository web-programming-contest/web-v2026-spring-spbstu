<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ массива</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 400px;
            padding: 8px;
            background-color: #ffffff;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .input-group input::placeholder {
            color: #999;
        }

        button {
            width: 100%;
            background-color: #0056ff;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background-color: #417ffb;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background-color: #f5f5f5;
            border: 1px solid #ccc;
        }

        .result p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="input-group">
        <input type="text" id="array" name="array" placeholder="Введите числовой массив через запятую" required>
    </div>
    <button onclick="processArray()">Анализировать</button>

    <div id="result" class="result" style="display: none;">
        <p>Итоговый массив: <span id="result-arr">[]</span></p>
    </div>
</div>
<script>
    function removeDuplicates(arr) {
        let result = [];

        for (let i = 0; i < arr.length; i++) {
            let isDuplicate = false;

            for (let j = 0; j < result.length; j++) {
                if (arr[i] === result[j]) {
                    isDuplicate = true;
                    break;
                }
            }

            if (!isDuplicate) {
                result.push(arr[i]);
            }
        }

        return result;
    }

    function processArray() {
            let input = document.getElementById('array').value;
            let parts = input.split(',').map(item => item.trim());
            let numbers = [];

            for (let i = 0; i < parts.length; i++) {
                let num = Number(parts[i]);
                if (!isNaN(num) && parts[i] !== '') {
                    numbers.push(num);
                }
            }

            let result = removeDuplicates(numbers);

            document.getElementById('result-arr').textContent = result;
            document.getElementById('result').style.display = 'block';
        }
</script>
</body>
</html>
