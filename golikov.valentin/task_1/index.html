<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Таблица продаж</title>
        <link rel="stylesheet" href="styles/main.css">
    </head>
    <body>
        <table class="styled-table">
            <!-- Table header -->
            <thead>
                <tr>
                    <th>Продукт</th>
                    <th>Продано</th>
                    <th>Выручка</th>
                </tr>
            </thead>

            <!-- Table body -->
            <tbody>
                <tr>
                    <td>Яблоки</td>
                    <td>124</td>
                    <td>6820</td>
                </tr>
                <tr>
                    <td>Бананы</td>
                    <td>215</td>
                    <td>9245</td>
                </tr>
                <tr>
                    <td>Апельсин</td>
                    <td>98</td>
                    <td>5880</td>
                </tr>
                <tr>
                    <td>Арбуз</td>
                    <td>35</td>
                    <td>6205</td>
                </tr>
                <tr>
                    <td>Груша</td>
                    <td>170</td>
                    <td>7830</td>
                </tr>
            </tbody>
            
            <!-- Table foot -->
            <tfoot>
                <tr>
                    <td><strong>Итого</strong></td>
                    <td><strong>642</strong></td>
                    <td><strong>35980</strong></td>
                </tr>
            </tfoot>
        </table>
    </body>
</html>
