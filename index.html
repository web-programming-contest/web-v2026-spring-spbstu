<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Movie Management System</h1>
            <div class="button-group">
                <button class="btn btn-primary" onclick="showAddMovieModal()">➕ Добавить фильм</button>
                <button class="btn btn-danger" onclick="showDeleteMovieModal()">🗑️ Удалить фильм</button>
                <button class="btn btn-success" onclick="showAddActorModal()">👤 Добавить актера</button>
                <button class="btn btn-danger" onclick="showRemoveActorModal()">❌ Удалить актера</button>
            </div>
        </div>

        <div class="stats-bar" id="statsBar"></div>
        <div id="moviesContainer" class="movies-grid"></div>
    </div>

    <!-- Add Movie Modal -->
    <div id="addMovieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Добавить фильм</h2>
                <span class="close" onclick="closeModal('addMovieModal')">&times;</span>
            </div>
            <form id="addMovieForm">
                <div class="form-group">
                    <label>Название фильма:</label>
                    <input type="text" id="movieTitle" required>
                </div>
                <div class="form-group">
                    <label>Режиссер:</label>
                    <input type="text" id="movieDirector" required>
                </div>
                <button type="submit" class="btn btn-primary">Добавить</button>
            </form>
        </div>
    </div>

    <!-- Delete Movie Modal -->
    <div id="deleteMovieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Удалить фильм</h2>
                <span class="close" onclick="closeModal('deleteMovieModal')">&times;</span>
            </div>
            <div class="form-group">
                <label>Выберите фильм:</label>
                <select id="deleteMovieSelect"></select>
            </div>
            <button onclick="deleteMovie()" class="btn btn-danger">Удалить</button>
        </div>
    </div>

    <!-- Add Actor Modal -->
    <div id="addActorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Добавить актера</h2>
                <span class="close" onclick="closeModal('addActorModal')">&times;</span>
            </div>
            <form id="addActorForm">
                <div class="form-group">
                    <label>Выберите фильм:</label>
                    <select id="addActorMovieSelect" required></select>
                </div>
                <div class="form-group">
                    <label>Имя актера:</label>
                    <input type="text" id="actorName" required>
                </div>
                <button type="submit" class="btn btn-primary">Добавить</button>
            </form>
        </div>
    </div>

    <!-- Remove Actor Modal -->
    <div id="removeActorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Удалить актера</h2>
                <span class="close" onclick="closeModal('removeActorModal')">&times;</span>
            </div>
            <div class="form-group">
                <label>Выберите фильм:</label>
                <select id="removeActorMovieSelect" onchange="updateActorsList()"></select>
            </div>
            <div class="form-group">
                <label>Выберите актера:</label>
                <select id="removeActorSelect"></select>
            </div>
            <button onclick="removeActor()" class="btn btn-danger">Удалить</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
