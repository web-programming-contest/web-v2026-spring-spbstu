<!DOCTYPE html>
<html>
    <head>
<meta charset="utf-*8">
<title>Лабораторная работа 1. Вариант 24. Регистрационная форма</title>
<link rel="stylesheet" href="style.css">
    </head>
    <body>
    <h1>Регистрационная форма</h1>
    <form>
        <input type="text" placeholder="Имя"><br>
        <input type="text" placeholder="Фамилия"><br>
        <input type="text" placeholder="E-mail"><br>
        <input type="password" placeholder="Пароль"><br>
        <input type="password" placeholder="Подтверждение пароля"><br>
        <label>
            Дата рождения: 
            <input type="date"><br>
        </label>
        <label id="country">Страна:  </label>
        <select id="country">
            <option type="text">Росиия</option>
            <option type="text">Беларусь</option>
            <option type="text">Казахстан</option>
            <option type="text">Франция</option>
            <option type="text" selected>Не выбрано</option>
            <option type="text">Италия</option>
            <option type="text">Испания</option>
            <option type="text">Португалия</option>
            <option type="text">Румыния</option>
            <option type="text">Венгрия</option>
            <option type="text">Болгария</option>
            <option type="text">Швеция</option>
            <option type="text">Финляндия</option>
        </select><br>
        <input type="checkbox" id="checkbox">
        <label for="checkbox">Согласен с условиями</label><br>
        <button type="submit" id="submit1">Отправить форму</button>
    </form><br>
    </body>
</html>
