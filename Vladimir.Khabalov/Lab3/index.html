<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Самый частый элемент</title>
</head>
<body>

<h2>Найти самый частый элемент (с учётом равенства)</h2>

<input type="text" id="arrayInput" placeholder="Введите числа через запятую">
<button onclick="handleFind()">Найти</button>

<p id="result"></p>

<script>
    function findMostFrequent(arr) {
        const frequency = {};
        let maxCount = 0;

        // Считаем частоты
        for (let item of arr) {        
            frequency[item] = (frequency[item] || 0) + 1;
            if (frequency[item] > maxCount) {
                maxCount = frequency[item];
            }
        }

        // Собираем все элементы с максимальной частотой
        const result = [];
        for (let key in frequency) {
            if (frequency[key] === maxCount) {
                result.push(key);
            }
        }

        return result;
    }

    function handleFind() {
        const input = document.getElementById("arrayInput").value;
        const arr = input.split(",").map(item => item.trim());

        const result = findMostFrequent(arr);

        document.getElementById("result").innerText = 
            "Самые частые элементы: " + result.join(", ");
    }
</script>

</body>
</html>
