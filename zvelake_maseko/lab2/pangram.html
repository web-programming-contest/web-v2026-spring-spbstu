<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta charset="utf-8"/>
        <link rel="stylesheet" href="/web_dev_politech/static/css/lab2.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <title>Lab1 - Products</title>
        <script src="/web_dev_politech/static/js/lab2-pangram.js"></script>
    </head>
    <body>
        <div id="root">
            <div class="section-header">
                <h2 class="header-title">Является ли фраза панграммой?</h2>
            </div>
            <form class="form container box" novalidate>
                <div class="icon-box"></div>
                <div class="language-picker">
                    <label for="lang-ru" class="box">
                        <input type="radio" value="ru" name="language" id="lang-ru" checked/>
                        <div class="label-box-outline"></div>
                        <span class="lang-text">RU</span>
                        <i class="fa-solid fa-globe"></i>
                    </label>
                    <label for="lang-en" class="box">
                        <input type="radio" value="en" name="language" id="lang-en"/>
                        <div class="label-box-outline"></div>
                        <span class="lang-text">ENG</span>
                        <i class="fa-solid fa-globe"></i>
                    </label>
                </div>
                <div class="input-field box">
                    <input type="text" name="word" placeholder="Введите любое слово или фразу"/>
                </div>
                <button type="submit" id="submitButton">
                    <span class="button-text">Запустить</span>
                </button>
                <div class="loader">
                    <div class="loader-spinner"></div>
                </div>
            </form>
            <div class="examples box">
                <div class="section-header"><h3 class="header-title">Примеры</h3></div>
            </div>
        </div>
    </body>
</html>
