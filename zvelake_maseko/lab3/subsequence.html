<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta charset="utf-8"/>
        <link rel="stylesheet" href="/web_dev_politech/static/css/lab2.css">
        <link rel="stylesheet" href="/web_dev_politech/static/css/lab3.css">
        <title>Lab1 - Products</title>
        <script src="/web_dev_politech/static/js/lab3-subsequence.js"></script>
    </head>
    <body>
        <div id="root">
            <div class="section-header">
                <h2>длина наибольшей возрастающей подпоследовательности</h2>
            </div>
            <div class="container">
                <div class="left-box box">
                    <form novalidate>
                        <div class="field">
                            <div class="field-title">
                                <h4>subsequence finder</h4>
                            </div>
                            <div class="input-field box">
                                <input type="text" name="sequence" id="sequence" placeholder="Введите последовательности чисел через запятую"/>
                            </div>
                            <span class="msg-helper"></span>
                        </div>
                        <div class="buttons">
                            <button type="submit" class="submit-btn" id="submitButton">запустить</button>
                        </div>
                    </form>
                </div>
                <div class="right-box box result">
                    <div class="section-header">
                        <h2>Решение</h2>
                    </div>
                    <div class="loader">
                        <div class="loader-spinner"></div>
                    </div>
                </div>
            </div>
            <div class="examples box">
                <div class="section-header">
                    <h2>Примеры</h2>
                </div>
                <div class="examples-list">
                    
                </div>
            </div>
        </div>
    </body>
</html>
