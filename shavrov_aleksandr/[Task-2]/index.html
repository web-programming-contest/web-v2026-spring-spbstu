<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторная 2 — Проверка скобок</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 24px;
    }

    .container {
      background: #fff;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    .result {
      margin-top: 20px;
      padding: 14px;
      border-radius: 4px;
      font-size: 16px;
      text-align: center;
      display: none;
    }

    .result.true {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .result.false {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .examples {
      margin-top: 24px;
    }

    .examples h3 {
      margin-bottom: 10px;
    }

    .example-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-family: monospace;
      font-size: 14px;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.true { background: #d4edda; color: #155724; }
    .badge.false { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>Проверка сбалансированности скобок</h1>
  <div class="container">
    <label for="inputStr">Введите строку:</label>
    <input type="text" id="inputStr" placeholder="{[()]}" value="{[()]}">
    <button onclick="checkBalance()">Проверить</button>
    <div class="result" id="result"></div>

    <div class="examples">
      <h3>Примеры:</h3>
      <div class="example-item">
        <span>"{[()]}"</span>
        <span class="badge true">true</span>
      </div>
      <div class="example-item">
        <span>"[(])"</span>
        <span class="badge false">false</span>
      </div>
      <div class="example-item">
        <span>"{[]}"</span>
        <span class="badge true">true</span>
      </div>
      <div class="example-item">
        <span>"((("</span>
        <span class="badge false">false</span>
      </div>
      <div class="example-item">
        <span>""</span>
        <span class="badge true">true</span>
      </div>
    </div>
  </div>

  <script>
    /**
     * Проверяет сбалансированность скобок ()[]{} в строке.
     * @param {string} str - входная строка
     * @returns {boolean} true если скобки сбалансированы, иначе false
     */
    function isBalanced(str) {
      const stack = [];
      const openBrackets = new Set(['(', '[', '{']);
      const closingMap = {
        ')': '(',
        ']': '[',
        '}': '{'
      };

      for (const char of str) {
        if (openBrackets.has(char)) {
          stack.push(char);
        } else if (char in closingMap) {
          if (stack.length === 0 || stack[stack.length - 1] !== closingMap[char]) {
            return false;
          }
          stack.pop();
        }
      }

      return stack.length === 0;
    }

    function checkBalance() {
      const str = document.getElementById('inputStr').value;
      const result = isBalanced(str);
      const resultEl = document.getElementById('result');

      resultEl.style.display = 'block';
      resultEl.className = `result ${result}`;
      resultEl.textContent = `"${str}" → ${result}`;
    }

    // Примеры в консоли
    console.log('isBalanced("{[()]}") =>', isBalanced('{[()]}'));  // true
    console.log('isBalanced("[(])") =>', isBalanced('[(])'));      // false
    console.log('isBalanced("{[]}") =>', isBalanced('{[]}'));      // true
    console.log('isBalanced("(((") =>', isBalanced('((('));        // false
    console.log('isBalanced("") =>', isBalanced(''));              // true
  </script>
</body>
</html>
