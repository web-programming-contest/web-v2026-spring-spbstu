<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторная 1 — Меню блюд</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      background: #f5f5f5;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      width: 400px;
      background: #fff;
      border: 1px solid #000;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 12px;
      border-bottom: 1px solid #000;
    }

    li:last-child {
      border-bottom: none;
    }

    .dish-name {
      text-align: left;
    }

    .dish-price {
      text-align: right;
      white-space: nowrap;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <ul>
    <li>
      <span class="dish-name">Борщ украинский</span>
      <span class="dish-price">250 ₽</span>
    </li>
    <li>
      <span class="dish-name">Салат Цезарь</span>
      <span class="dish-price">320 ₽</span>
    </li>
    <li>
      <span class="dish-name">Стейк из говядины с овощами гриль</span>
      <span class="dish-price">890 ₽</span>
    </li>
    <li>
      <span class="dish-name">Паста карбонара</span>
      <span class="dish-price">450 ₽</span>
    </li>
    <li>
      <span class="dish-name">Тирамису</span>
      <span class="dish-price">280 ₽</span>
    </li>
    <li>
      <span class="dish-name">Чай / Кофе</span>
      <span class="dish-price">120 ₽</span>
    </li>
  </ul>
</body>
</html>
