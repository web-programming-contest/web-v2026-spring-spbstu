<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторная 4 — Управление автомобилями</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    /* ---- Панель управления ---- */
    .controls {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .controls h2 { margin-top: 0; margin-bottom: 16px; }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label { font-size: 13px; font-weight: bold; color: #555; }

    input[type="text"] {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      min-width: 160px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      align-items: flex-end;
    }

    select {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      min-width: 160px;
    }

    /* ---- Кнопки ---- */
    button {
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-add    { background: #28a745; color: #fff; }
    .btn-remove { background: #dc3545; color: #fff; }
    .btn-owner  { background: #4a90e2; color: #fff; }
    .btn-filter { background: #6c757d; color: #fff; }
    .btn-reset  { background: #f0ad4e; color: #fff; }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: default; }

    /* ---- Статус ---- */
    .status {
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .status.success { background: #d4edda; color: #155724; }
    .status.error   { background: #f8d7da; color: #721c24; }
    .status.info    { background: #d1ecf1; color: #0c5460; }

    /* ---- Карточки ---- */
    #cardsContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .car-card {
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: transform 0.15s;
    }

    .car-card:hover { transform: translateY(-2px); }

    .car-card h3 {
      margin: 0 0 4px;
      font-size: 17px;
      color: #333;
    }

    .car-card .car-model {
      color: #666;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .car-card .owner-count {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }

    .owners-list {
      list-style: none;
      padding: 0;
      margin: 0 0 12px;
    }

    .owners-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .owners-list li:last-child { border-bottom: none; }

    .btn-remove-owner {
      padding: 2px 8px;
      font-size: 12px;
      background: #dc3545;
      color: #fff;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-actions button {
      flex: 1;
      font-size: 12px;
    }

    .no-cars {
      grid-column: 1/-1;
      text-align: center;
      color: #888;
      padding: 40px;
      font-size: 16px;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      display: none;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #fff;
      border-top-color: #4a90e2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>Управление автомобилями</h1>

<!-- Загрузка -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- Панель управления -->
<div class="controls">
  <h2>Добавить автомобиль</h2>
  <div class="form-row">
    <div class="form-group">
      <label for="newMake">Марка</label>
      <input type="text" id="newMake" placeholder="Toyota">
    </div>
    <div class="form-group">
      <label for="newModel">Модель</label>
      <input type="text" id="newModel" placeholder="Camry">
    </div>
    <button class="btn-add" onclick="handleAddCar()">Добавить автомобиль</button>
  </div>

  <hr>

  <h2>Фильтрация</h2>
  <div class="filter-row">
    <div class="form-group">
      <label for="filterMake">Фильтр по марке</label>
      <select id="filterMake" onchange="applyFilters()">
        <option value="">Все марки</option>
      </select>
    </div>
    <div class="form-group">
      <label for="filterOwner">Фильтр по владельцу</label>
      <input type="text" id="filterOwner" placeholder="Имя владельца" oninput="applyFilters()">
    </div>
    <div class="form-group">
      <label for="filterOwnerCount">Количество владельцев</label>
      <select id="filterOwnerCount" onchange="applyFilters()">
        <option value="">Любое</option>
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3+">3+</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetFilters()">Сбросить фильтры</button>
  </div>

  <div class="status" id="statusMsg"></div>
</div>

<!-- Карточки -->
<div id="cardsContainer"></div>

<script>
  // ============================================================
  // 4.1 Класс Car
  // ============================================================
  class Car {
    constructor(make, model, owners = []) {
      this.id = Date.now() + Math.random();
      this.make = make;
      this.model = model;
      this.owners = [...owners];
    }

    addOwner(name) {
      if (!name || this.owners.includes(name)) return;
      this.owners.push(name);
    }

    removeOwner(name) {
      this.owners = this.owners.filter(o => o !== name);
    }

    get ownerCount() {
      return this.owners.length;
    }
  }

  // ============================================================
  // 4.2 Функции для работы с массивом автомобилей
  // ============================================================

  /** Группирует автомобили по марке */
  function groupByMake(cars) {
    return cars.reduce((acc, car) => {
      if (!acc[car.make]) acc[car.make] = [];
      acc[car.make].push(car);
      return acc;
    }, {});
  }

  /** Возвращает уникальных владельцев */
  function getUniqueOwners(cars) {
    const all = cars.flatMap(car => car.owners);
    return [...new Set(all)];
  }

  /** Группирует по количеству владельцев */
  function groupByOwnerCount(cars) {
    return cars.reduce((acc, car) => {
      const count = car.ownerCount;
      if (!acc[count]) acc[count] = [];
      acc[count].push(car);
      return acc;
    }, {});
  }

  /** Возвращает автомобили с владельцем по имени */
  function getCarsByOwner(cars, name) {
    return cars.filter(car => car.owners.includes(name));
  }

  /** Возвращает список моделей для заданной марки */
  function getModelsByMake(cars, make) {
    return cars.filter(car => car.make === make).map(car => car.model);
  }

  // ============================================================
  // 4.3 Хранилище и асинхронные операции
  // ============================================================

  const STORAGE_KEY = 'lab4_cars';

  let cars = loadCars();

  function loadCars() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return getInitialCars();
      const data = JSON.parse(raw);
      return data.map(d => new Car(d.make, d.model, d.owners));
    } catch {
      return getInitialCars();
    }
  }

  function saveCars() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(
      cars.map(c => ({ id: c.id, make: c.make, model: c.model, owners: c.owners }))
    ));
  }

  function getInitialCars() {
    const c1 = new Car('Toyota', 'Camry', ['Иван', 'Мария']);
    const c2 = new Car('BMW', 'X5', ['Алексей']);
    const c3 = new Car('Toyota', 'Corolla', ['Ольга', 'Дмитрий', 'Сергей']);
    const c4 = new Car('Honda', 'Civic', []);
    return [c1, c2, c3, c4];
  }

  // --- Симуляция асинхронности через Promise + setTimeout ---
  function asyncDelay(ms = 600) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function showLoading()  { document.getElementById('loadingOverlay').style.display = 'flex'; }
  function hideLoading()  { document.getElementById('loadingOverlay').style.display = 'none'; }

  function showStatus(msg, type = 'info') {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = `status ${type}`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  async function handleAddCar() {
    const make  = document.getElementById('newMake').value.trim();
    const model = document.getElementById('newModel').value.trim();
    if (!make || !model) {
      showStatus('Заполните марку и модель!', 'error');
      return;
    }

    showLoading();
    await asyncDelay();

    const car = new Car(make, model);
    cars.push(car);
    saveCars();
    hideLoading();

    document.getElementById('newMake').value  = '';
    document.getElementById('newModel').value = '';

    showStatus(`Автомобиль ${make} ${model} добавлен.`, 'success');
    render();
  }

  async function handleRemoveCar(carId) {
    showLoading();
    await asyncDelay();

    cars = cars.filter(c => c.id !== carId);
    saveCars();
    hideLoading();

    showStatus('Автомобиль удалён.', 'success');
    render();
  }

  async function handleAddOwner(carId) {
    const name = prompt('Введите имя нового владельца:');
    if (!name || !name.trim()) return;

    showLoading();
    await asyncDelay();

    const car = cars.find(c => c.id === carId);
    if (car) {
      if (car.owners.includes(name.trim())) {
        hideLoading();
        showStatus(`Владелец "${name.trim()}" уже существует.`, 'error');
        return;
      }
      car.addOwner(name.trim());
      saveCars();
    }

    hideLoading();
    showStatus(`Владелец "${name.trim()}" добавлен.`, 'success');
    render();
  }

  async function handleRemoveOwner(carId, ownerName) {
    showLoading();
    await asyncDelay();

    const car = cars.find(c => c.id === carId);
    if (car) {
      car.removeOwner(ownerName);
      saveCars();
    }

    hideLoading();
    showStatus(`Владелец "${ownerName}" удалён.`, 'success');
    render();
  }

  // ============================================================
  // Фильтры
  // ============================================================

  let activeFilters = { make: '', owner: '', ownerCount: '' };

  function applyFilters() {
    activeFilters.make       = document.getElementById('filterMake').value;
    activeFilters.owner      = document.getElementById('filterOwner').value.trim().toLowerCase();
    activeFilters.ownerCount = document.getElementById('filterOwnerCount').value;
    renderCards(getFilteredCars());
  }

  function resetFilters() {
    activeFilters = { make: '', owner: '', ownerCount: '' };
    document.getElementById('filterMake').value       = '';
    document.getElementById('filterOwner').value      = '';
    document.getElementById('filterOwnerCount').value = '';
    renderCards(cars);
  }

  function getFilteredCars() {
    return cars.filter(car => {
      if (activeFilters.make && car.make !== activeFilters.make) return false;
      if (activeFilters.owner && !car.owners.some(o => o.toLowerCase().includes(activeFilters.owner))) return false;
      if (activeFilters.ownerCount) {
        if (activeFilters.ownerCount === '3+') {
          if (car.ownerCount < 3) return false;
        } else {
          if (car.ownerCount !== Number(activeFilters.ownerCount)) return false;
        }
      }
      return true;
    });
  }

  // ============================================================
  // Рендер
  // ============================================================

  function updateMakeFilter() {
    const sel = document.getElementById('filterMake');
    const current = sel.value;
    const makes = [...new Set(cars.map(c => c.make))].sort();
    sel.innerHTML = '<option value="">Все марки</option>';
    makes.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      if (m === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function renderCards(list) {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = '';

    if (list.length === 0) {
      container.innerHTML = '<div class="no-cars">Автомобили не найдены</div>';
      return;
    }

    for (const car of list) {
      const card = document.createElement('div');
      card.className = 'car-card';

      const ownerItems = car.owners.map(o =>
        `<li>
          <span>${o}</span>
          <button class="btn-remove-owner" onclick="handleRemoveOwner(${car.id}, '${o.replace(/'/g, "\\'")}')">✕</button>
        </li>`
      ).join('');

      card.innerHTML = `
        <h3>${car.make}</h3>
        <div class="car-model">${car.model}</div>
        <div class="owner-count">Владельцев: ${car.ownerCount}</div>
        <ul class="owners-list">
          ${ownerItems || '<li style="color:#aaa;font-style:italic">Нет владельцев</li>'}
        </ul>
        <div class="card-actions">
          <button class="btn-owner" onclick="handleAddOwner(${car.id})">+ Владелец</button>
          <button class="btn-remove" onclick="handleRemoveCar(${car.id})">Удалить авто</button>
        </div>
      `;
      container.appendChild(card);
    }
  }

  function render() {
    updateMakeFilter();
    renderCards(getFilteredCars());
  }

  // Первоначальный рендер
  render();
</script>
</body>
</html>
